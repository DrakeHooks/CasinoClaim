services:
  casino-bot:
    container_name: casino-bot

    # Remote image. Use drakehooks/casinoclaim:testing for testing.
    image: drakehooks/casinoclaim:testing

    # Local build option:
    # Comment out the image above and uncomment these two lines if building locally.
    # build: .
    # image: casinoclaim-local:dev

    ports:
      - "5900:5900"

    environment:
      - CHROME_INSTANCE_DIR=/data/chrome
      - CHROME_PROFILE_DIR=Default
      - PYTHONPATH=/app:/app/apis:/app/app
      - FC_USER_DATA_DIR=/data/fortunecoins

      # Persistent TOML config path inside container.
      # This avoids mounting over /app/config.toml.
      - CASINO_CONFIG_PATH=/config.toml

    volumes:
      - chrome-profile:/data/chrome
      - chrome-profile:/data/fortunecoins

      # Persistent config file on host -> config file inside container.
      - ./config.toml:/config.toml:rw

      # CAPTCHA extension.
      - ./CAPTCHA-Solver-auto-hCAPTCHA-reCAPTCHA-freely-Chrome-Web-Store.crx:/temp/CAPTCHA-Solver-auto-hCAPTCHA-reCAPTCHA-freely-Chrome-Web-Store.crx:ro

    env_file:
      - .env

    shm_size: "2g"
    restart: unless-stopped

    entrypoint: ["/bin/bash", "-lc", "bash /app/entrypoint.sh"]

    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    container_name: watchtower
    image: nickfedor/watchtower:latest-dev

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=3600

    restart: unless-stopped

volumes:
  chrome-profile: